network 203.0.113.0 mask 255.255.255.0
  router bgp 64513
    bgp router-id 10.2.237.1
    bgp log-neighbor-changes
    no bgp ebgp-requires-policy
    no bgp default ipv4-unicast
    bgp graceful-restart

    ! iBGP neighbor (Site B over WireGuard)
    neighbor 10.0.0.2 remote-as 64513
    neighbor 10.0.0.2 description iBGP-SiteB-WireGuard
    neighbor 10.0.0.2 update-source tun0
    neighbor 10.0.0.2 timers 10 30

    ! eBGP peer group for local infrastructure
    neighbor LOCAL-INFRA peer-group
    neighbor LOCAL-INFRA remote-as 64512
    neighbor LOCAL-INFRA description local-infrastructure
    neighbor LOCAL-INFRA timers 3 9

    ! Cisco switch peer
    neighbor 10.1.237.4 peer-group LOCAL-INFRA
    neighbor 10.1.237.4 description cisco-switch

    ! Kubernetes nodes
    neighbor 10.10.10.20 peer-group LOCAL-INFRA
    neighbor 10.10.10.21 peer-group LOCAL-INFRA
    neighbor 10.10.10.22 peer-group LOCAL-INFRA
    neighbor 10.10.10.23 peer-group LOCAL-INFRA
    neighbor 10.10.10.24 peer-group LOCAL-INFRA
    neighbor 10.10.10.25 peer-group LOCAL-INFRA
    neighbor 10.10.10.26 peer-group LOCAL-INFRA
    neighbor 10.10.10.27 peer-group LOCAL-INFRA
    neighbor 10.10.10.28 peer-group LOCAL-INFRA
    neighbor 10.10.10.29 peer-group LOCAL-INFRA

    address-family ipv4 unicast

      ! iBGP neighbor (Site B)
      neighbor 10.0.0.2 activate
      neighbor 10.0.0.2 next-hop-self
      neighbor 10.0.0.2 soft-reconfiguration inbound
      neighbor 10.0.0.2 route-map IBGP-IN in
      neighbor 10.0.0.2 route-map IBGP-OUT out
      neighbor 10.0.0.2 maximum-prefix 50 80

      ! Local infrastructure eBGP
      neighbor LOCAL-INFRA activate
      neighbor LOCAL-INFRA next-hop-self
      neighbor LOCAL-INFRA soft-reconfiguration inbound
      neighbor LOCAL-INFRA route-map EBGP-LOCAL-IN in
      neighbor LOCAL-INFRA route-map EBGP-LOCAL-OUT out
      neighbor LOCAL-INFRA maximum-prefix 100 80

      ! Default route only to Cisco switch
      neighbor 10.1.237.4 default-originate
    exit-address-family
  !
  ! Route maps for iBGP (Site-to-Site)
  route-map IBGP-IN permit 10
    description Accept remote site networks
    match ip address prefix-list REMOTE-SITES
    set local-preference 200
  !
  route-map IBGP-IN deny 999
  !
  route-map IBGP-OUT permit 10
    description Advertise local networks to remote sites
    match ip address prefix-list LOCAL-NETWORKS
  !
  route-map IBGP-OUT deny 999
  !
  ! Route maps for eBGP (Local Infrastructure)
  route-map EBGP-LOCAL-IN permit 10
    description Accept k8s service networks
    match ip address prefix-list K8S-SERVICES
    set local-preference 100
  !
  route-map EBGP-LOCAL-IN deny 999
  !
  route-map EBGP-LOCAL-OUT permit 10
    description Advertise infrastructure networks
    match ip address prefix-list INFRA-NETWORKS
  !
  route-map EBGP-LOCAL-OUT deny 999
  !
  ! Prefix lists
  ip prefix-list LOCAL-NETWORKS seq 10 permit 10.10.10.0/24
  ip prefix-list LOCAL-NETWORKS seq 20 permit 10.0.42.0/24
  !
  ! Be more specific about remote sites instead of entire 10.0.0.0/8
  ip prefix-list REMOTE-SITES seq 10 permit 10.0.0.0/24
  ip prefix-list REMOTE-SITES seq 20 permit 10.20.0.0/16 le 24
  !
  ip prefix-list K8S-SERVICES seq 10 permit 10.96.0.0/12 le 32
  ip prefix-list K8S-SERVICES seq 20 permit 192.168.0.0/16 le 32
  !
  ip prefix-list INFRA-NETWORKS seq 10 permit 10.10.10.0/24
  ip prefix-list INFRA-NETWORKS seq 20 permit 10.0.42.0/24
  !
