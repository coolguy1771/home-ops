---
# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
clusterName: kyak
# renovate: datasource=github-releases depName=siderolabs/talos
talosVersion: v1.13.6
# renovate: datasource=github-releases depName=kubernetes/kubernetes
kubernetesVersion: v1.36.2
additionalApiServerCertSans: &san
  - 10.10.10.201
  - k8s-lb.286k.co
  - 127.0.0.1
additionalMachineCertSans: *san
endpoint: https://k8s-lb.286k.co:6443
domain: cluster.local
clusterPodNets:
  - 10.244.0.0/16
clusterSvcNets:
  - 10.96.0.0/12
cniConfig:
  name: none
nodes:
  - hostname: k8s-0
    ipAddress: 10.10.10.20
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-CT240BX500SSD1_2206E60A4A88
    networkInterfaces: &controlPlaneNet
      - interface: enp1s0
        mtu: 1500
        dhcp: true
        vip:
          ip: 10.10.10.201
    schematic: &intelSchematic
      customization:
        extraKernelArgs: &hardeningKernelArgs
          - slab_nomerge
          - init_on_alloc=1
          - init_on_free=1
          - pti=on
          - vsyscall=none
          - oops=panic
          - randomize_kstack_offset=on
        systemExtensions:
          officialExtensions:
            - siderolabs/binfmt-misc
            - siderolabs/fuse3
            - siderolabs/glibc
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/mei
            - siderolabs/nfsrahead
            - siderolabs/util-linux-tools

  - hostname: k8s-1
    ipAddress: 10.10.10.21
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-CT240BX500SSD1_2148E5EA7AA5
    networkInterfaces: *controlPlaneNet
    schematic: &intelSchematicIce
      customization:
        extraKernelArgs: *hardeningKernelArgs
        systemExtensions:
          officialExtensions:
            - siderolabs/binfmt-misc
            - siderolabs/fuse3
            - siderolabs/glibc
            - siderolabs/intel-ice-firmware
            - siderolabs/i915
            - siderolabs/intel-ucode
            - siderolabs/mei
            - siderolabs/nfsrahead
            - siderolabs/util-linux-tools

  - hostname: k8s-2
    ipAddress: 10.10.10.22
    controlPlane: true
    installDisk: /dev/disk/by-id/ata-WD_easystore_240GB_20215C802161
    networkInterfaces: *controlPlaneNet
    schematic: *intelSchematic

  - hostname: k8s-3
    ipAddress: 10.10.10.23
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-WD_Blue_SN570_250GB_223960805185
    networkInterfaces: &workerEno1
      - interface: eno1
        mtu: 1500
        dhcp: true
    schematic: *intelSchematic

  - hostname: k8s-4
    ipAddress: 10.10.10.24
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-WD_Blue_SN570_250GB_223960805195
    networkInterfaces: *workerEno1
    schematic: *intelSchematic

  - hostname: k8s-5
    ipAddress: 10.10.10.25
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-SAMSUNG_MZVLB512HAJQ-000L7_S3TNNE0JC71391
    networkInterfaces: &workerEnp0s31f6
      - interface: enp0s31f6
        mtu: 1500
        dhcp: true
    schematic: *intelSchematic

  - hostname: k8s-6
    ipAddress: 10.10.10.26
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-SAMSUNG_MZVLB512HAJQ-000L7_S3TNNE0JC70877
    networkInterfaces: *workerEnp0s31f6
    schematic: *intelSchematic

  - hostname: k8s-7
    ipAddress: 10.10.10.27
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-WDC_PC_SN730_SDBQNTY-256G-1001_2017B6801388
    networkInterfaces: &workerEnp3s0f0
      - interface: enp3s0f0
        mtu: 1500
        dhcp: true
    schematic: &amdSchematic
      customization:
        extraKernelArgs: *hardeningKernelArgs
        systemExtensions:
          officialExtensions:
            - siderolabs/amd-ucode
            - siderolabs/amdgpu
            - siderolabs/binfmt-misc
            - siderolabs/fuse3
            - siderolabs/glibc

  - hostname: k8s-8
    ipAddress: 10.10.10.28
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-SAMSUNG_MZVLB256HBHQ-000L7_S4ELNX4N714860
    networkInterfaces: *workerEnp3s0f0
    schematic: *amdSchematic

  - hostname: k8s-9
    ipAddress: 10.10.10.29
    controlPlane: false
    installDisk: /dev/disk/by-id/ata-HRAA2S0512ZILM2_6G000SJA
    networkInterfaces:
      - interface: eno1
        mtu: 1500
        dhcp: true
      - interface: eno2
        mtu: 1500
        dhcp: false
      - interface: enp55s0f0
        mtu: 1500
        dhcp: false
      - interface: enp55s0f1
        mtu: 1500
        dhcp: false
    schematic:
      customization:
        extraKernelArgs: *hardeningKernelArgs
        systemExtensions:
          officialExtensions:
              - siderolabs/binfmt-misc
              - siderolabs/fuse3
              - siderolabs/glibc
              - siderolabs/intel-ucode
  - hostname: k8s-10
    ipAddress: 10.10.10.30
    controlPlane: false
    installDisk: /dev/disk/by-id/ata-Micron_1300_MTFDDAK512TDL_20482C32A385
    networkInterfaces: *workerEnp0s31f6
    schematic: *intelSchematic
  - hostname: k8s-11
    ipAddress: 10.10.10.31
    controlPlane: false
    installDisk: /dev/disk/by-id/nvme-Samsung_SSD_990_PRO_1TB_S6Z1NJ0W218517V
    networkInterfaces:
      - interface: enp88s0
        mtu: 1500
        dhcp: true
    schematic: *intelSchematic
controlPlane:
  patches:
    - |-
      machine:
        install:
          grubUseUKICmdline: true

    - |-
      cluster:
        coreDNS:
          disabled: true
    - |-
      machine:
        kubelet:
          nodeIP:
            validSubnets:
              - 10.10.10.0/24
    - &diskEncryption |-
      machine:
        systemDiskEncryption:
          ephemeral:
            provider: luks2
            keys:
              - nodeID: {}
                slot: 0
          state:
            provider: luks2
            keys:
              - nodeID: {}
                slot: 0
    - |-
      machine:
        kubelet:
          defaultRuntimeSeccompProfileEnabled: true
          disableManifestsDirectory: true
          extraArgs:
            feature-gates: ImageVolume=true,MutatingAdmissionPolicy=true
            rotate-server-certificates: "true"
          extraConfig:
            serializeImagePulls: false
    - |-
      cluster:
        apiServer:
          auditPolicy:
            apiVersion: audit.k8s.io/v1
            kind: Policy
            rules:
              - level: Metadata
          extraArgs:
            enable-aggregator-routing: "true"
            feature-gates: MutatingAdmissionPolicy=true,HPAScaleToZero=true
    - |-
      cluster:
        controllerManager:
          extraArgs:
            bind-address: 0.0.0.0
            feature-gates: HPAScaleToZero=true
    - |-
      cluster:
        scheduler:
          config:
            apiVersion: kubescheduler.config.k8s.io/v1
            kind: KubeSchedulerConfiguration
            profiles:
              - schedulerName: default-scheduler
                plugins:
                  score:
                    disabled:
                      - name: ImageLocality
                pluginConfig:
                  - name: PodTopologySpread
                    args:
                      defaultingType: List
                      defaultConstraints:
                        - maxSkew: 1
                          topologyKey: kubernetes.io/hostname
                          whenUnsatisfiable: ScheduleAnyway
          extraArgs:
            bind-address: 0.0.0.0
    - |-
      cluster:
        discovery:
          registries:
            service:
              disabled: false
    - |-
      cluster:
        proxy:
          disabled: true
    - |-
      cluster:
        etcd:
          extraArgs:
            listen-metrics-urls: http://127.0.0.1:2381
            metrics: extensive
          advertisedSubnets:
            - 10.10.10.0/24
    - |-
      machine:
        features:
          rbac: true
          apidCheckExtKeyUsage: true
          diskQuotaSupport: true
          kubePrism:
            enabled: true
            port: 7445
          hostDNS:
            enabled: true
            resolveMemberNames: true
            forwardKubeDNSToHost: false
          kubernetesTalosAPIAccess:
            allowedKubernetesNamespaces:
              - actions-runner-system
              - system-upgrade
            allowedRoles:
              - os:admin
            enabled: true
    - |-
      machine:
        files:
          - op: create
            path: /etc/cri/conf.d/20-customization.part
            content: |
              [plugins."io.containerd.cri.v1.images"]
                discard_unpacked_layers = false
              [plugins."io.containerd.cri.v1.runtime"]
                cdi_spec_dirs = ["/run/cdi"]
                device_ownership_from_security_context = true
          - op: overwrite
            path: /etc/nfsmount.conf
            permissions: 0o644
            content: |
              [ NFSMount_Global_Options ]
              nfsvers=4.2
              hard=True
              nconnect=16
              noatime=True
              rsize=1048576
              wsize=1048576
    - |-
      machine:
        sysctls:
          fs.inotify.max_user_watches: "1048576"
          fs.inotify.max_user_instances: "8192"
          vm.panic_on_oom: "0"
          vm.overcommit_memory: "1"
          kernel.panic: "10"
          kernel.panic_on_oops: "1"
          net.core.rmem_max: "7500000"
          net.core.wmem_max: "7500000"
    - &time |-
      machine:
        time:
          disabled: false
          servers:
            - time.cloudflare.com

worker:
  patches:
    - |-
      machine:
        install:
          grubUseUKICmdline: true

    - |-
      machine:
        kubelet:
          nodeIP:
            validSubnets:
              - 10.10.10.0/24
    - |-
      machine:
        kubelet:
          defaultRuntimeSeccompProfileEnabled: true
          disableManifestsDirectory: true
          extraArgs:
            feature-gates: ImageVolume=true,MutatingAdmissionPolicy=true
          extraConfig:
            serializeImagePulls: false
    - |-
      machine:
        kubelet:
          extraMounts:
            - destination: /var/openebs/local
              type: bind
              source: /var/openebs/local
              options:
                - bind
                - rshared
                - rw
    - *diskEncryption
    - |-
      machine:
        features:
          apidCheckExtKeyUsage: true
          diskQuotaSupport: true
          hostDNS:
            enabled: true
            forwardKubeDNSToHost: false
            resolveMemberNames: true
          kubePrism:
            enabled: true
            port: 7445
          rbac: true
    - |-
      machine:
        files:
          - op: create
            path: /etc/cri/conf.d/20-customization.part
            content: |
              [plugins."io.containerd.cri.v1.images"]
                discard_unpacked_layers = false
              [plugins."io.containerd.cri.v1.runtime"]
                cdi_spec_dirs = ["/run/cdi"]
                device_ownership_from_security_context = true
          - op: overwrite
            path: /etc/nfsmount.conf
            permissions: 0o644
            content: |
              [ NFSMount_Global_Options ]
              nfsvers=4.2
              hard=True
              nconnect=16
              noatime=True
              nolock=True
              rsize=1048576
              wsize=1048576
    - |-
      machine:
        sysctls:
          fs.inotify.max_user_instances: "8192"
          fs.inotify.max_user_watches: "1048576"
          net.core.default_qdisc: fq
          net.core.rmem_max: "67108864"
          net.core.wmem_max: "67108864"
          net.ipv4.neigh.default.gc_thresh1: "4096"
          net.ipv4.neigh.default.gc_thresh2: "8192"
          net.ipv4.neigh.default.gc_thresh3: "16384"
          net.ipv4.tcp_congestion_control: bbr
          net.ipv4.tcp_fastopen: "3"
          net.ipv4.tcp_mtu_probing: "1"
          net.ipv4.ping_group_range: 0 2147483647
          net.ipv4.tcp_notsent_lowat: "131072"
          net.ipv4.tcp_rmem: 4096 87380 33554432
          net.ipv4.tcp_slow_start_after_idle: "0"
          net.ipv4.tcp_window_scaling: "1"
          net.ipv4.tcp_wmem: 4096 65536 33554432
          sunrpc.tcp_max_slot_table_entries: "128"
          sunrpc.tcp_slot_table_entries: "128"
          user.max_user_namespaces: "11255"
          vm.nr_hugepages: "1024"
    - *time
    - |-
      machine:
        udev:
          rules:
            - SUBSYSTEM=="drm", KERNEL=="card*", GROUP="44", MODE="0660"
            - SUBSYSTEM=="drm", KERNEL=="renderD*", GROUP="44", MODE="0660"
