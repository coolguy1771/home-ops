---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Bulk Merge PRs"

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: "false"
        required: false
      labels:
        description: Labels
        default: "any"
        required: false

jobs:
  bulk-merge-prs:
    name: Bulk Merge PRs
    runs-on: ubuntu-latest
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Merge
        shell: bash
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
          INPUT_LABELS: "${{ github.event.inputs.labels }}"
          INPUT_DRY_RUN: "${{ github.event.inputs.dryRun }}"
        run: |
          args=()
          args+=(--state open)
          args+=(--search "-label:hold")
          args+=(--search "-label:type/major")
          if [ "$INPUT_LABELS" != "any" ]; then
              IFS=',' read -ra labels <<< "$INPUT_LABELS"
              for label in "${labels[@]}"; do
                  args+=(--label "${label}")
              done
          fi
          for id in $(gh pr list "${args[@]}" --jq '.[].number' --json number); do
              if [ "$INPUT_DRY_RUN" = "true" ]; then
                  echo "Dry run: gh pr merge $id --squash"
                  continue
              fi
              gh pr merge "${id}" --squash
              sleep 2
          done
