---
# Public read access to apiserver OIDC discovery endpoints (Artifactory, etc.).
# Mirrors system:service-account-issuer-discovery rules without owning that object.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: oidc-issuer-discovery-public
rules:
  - nonResourceURLs:
      - /.well-known/openid-configuration
      - /.well-known/openid-configuration/
      - /openid/v1/jwks
      - /openid/v1/jwks/
    verbs:
      - get
