---
apiVersion: postgres-operator.crunchydata.com/v1beta1
kind: PostgresCluster
metadata:
  name: &name postgres
spec:
  postgresVersion: 18

  metadata:
    labels:
      crunchy-userinit.ramblurr.github.com/enabled: "true"
      crunchy-userinit.ramblurr.github.com/superuser: "postgres"

  service:
    type: LoadBalancer
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: postgres.witl.xyz
        lbipam.cilium.io/ips: 10.0.42.8

  patroni:
    dynamicConfiguration:
      synchronous_mode: true
      postgresql:
        synchronous_commit: "on"
        pg_hba:
          - hostnossl all all 10.244.0.0/16 md5
          - hostssl all all all md5

  instances:
    - name: postgres
      metadata:
        labels:
          app.kubernetes.io/name: crunchy-postgres
          ingress.home.arpa/lan: allow
          egress.home.arpa/apiserver: allow
          egress.home.arpa/minio: allow
          egress.home.arpa/kubedns: allow
      replicas: &replica 3
      dataVolumeClaimSpec:
        storageClassName: openebs-hostpath
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              postgres-operator.crunchydata.com/cluster: *name
              postgres-operator.crunchydata.com/data: postgres

  users:
    # Superuser
    - name: postgres
      databases:
        - postgres
      options: "SUPERUSER"
      password:
        type: AlphaNumeric
    # Migrated from CNPG
    - name: bazarr
      databases:
        - bazarr
      password:
        type: AlphaNumeric
    - name: gatus
      databases:
        - gatus
      password:
        type: AlphaNumeric
    - name: prowlarr
      databases:
        - prowlarr
      password:
        type: AlphaNumeric
    - name: radarr
      databases:
        - radarr
      password:
        type: AlphaNumeric
    - name: sonarr
      databases:
        - sonarr
      password:
        type: AlphaNumeric
    # New applications
    - name: atuin
      databases:
        - atuin
      password:
        type: AlphaNumeric
    - name: authelia
      databases:
        - authelia
      password:
        type: AlphaNumeric
    - name: authentik
      databases:
        - authentik
      password:
        type: AlphaNumeric
    - name: autobrr
      databases:
        - autobrr
      password:
        type: AlphaNumeric
    - name: lldap
      databases:
        - lldap
      password:
        type: AlphaNumeric

  backups:
    pgbackrest:
      configuration: &backupConfig
        - secret:
            name: crunchy-postgres-secret
      global: &backupFlag
        archive-timeout: "60"
        compress-type: "bz2"
        compress-level: "9"
        delta: "y"
        repo1-retention-full-type: "time"
        repo1-retention-full: "14"
        repo1-retention-diff: "30"
        repo1-path: "/crunchy-postgres18"
        repo1-s3-uri-style: path
        archive-push-queue-max: 4GiB
      manual:
        repoName: repo1
        options:
          - --type=full
      metadata:
        labels:
          app.kubernetes.io/name: crunchy-postgres-backup
          egress.home.arpa/apiserver: allow
          egress.home.arpa/minio: allow
          egress.home.arpa/kubedns: allow
      repos:
        - name: repo1
          s3: &minio
            bucket: "crunchy-postgres"
            endpoint: "s3.286k.co"
            region: "us-east-1"
          schedules:
            full: "0 1 * * 0"       # Sunday 01:00
            differential: "0 1 * * 1-6" # Mon-Sat 01:00
            incremental: "0 2-23 * * *"  # Hourly except 01:00

  proxy:
    pgBouncer:
      port: 5432
      replicas: *replica
      metadata:
        labels:
          app.kubernetes.io/name: crunchy-postgres-pgbouncer
          egress.home.arpa/kubedns: allow
      config:
        global:
          pool_mode: "transaction"
          client_tls_sslmode: prefer
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              postgres-operator.crunchydata.com/cluster: *name
              postgres-operator.crunchydata.com/role: pgbouncer
